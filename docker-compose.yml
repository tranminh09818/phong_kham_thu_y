version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rexi_sqlserver
    environment:
      SA_PASSWORD: "${DB_PASSWORD:123456}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./QLy\ Phòng\ Khám\ Thú\ Y/PKTY.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rexi_network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:123456}", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Java Spring Boot Backend
  backend:
    build:
      context: ./BackendPKTY
      dockerfile: Dockerfile
    container_name: rexi_backend
    environment:
      DB_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=PhongKhamThuY;encrypt=true;trustServerCertificate=true"
      DB_USERNAME: "${DB_USERNAME:sa}"
      DB_PASSWORD: "${DB_PASSWORD:123456}"
      JWT_SECRET: "${JWT_SECRET:your_super_secret_key_change_this_in_production_immediately_use_min_32_chars}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:86400000}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    ports:
      - "8081:8081"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - rexi_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/api/lich-hen/count" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./QLy\ Phòng\ Khám\ Thú\ Y
      dockerfile: Dockerfile
    container_name: rexi_frontend
    environment:
      VITE_API_URL: "http://backend:8081"
      VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rexi_network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlserver_data:
    driver: local
  backend_logs:
    driver: local

networks:
  rexi_network:
    driver: bridge
