version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rexi_sqlserver
    environment:
      SA_PASSWORD: "${DB_PASSWORD:123456}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./PhongKhamThuY.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rexi_network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:123456}", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Java Spring Boot Backend
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      DB_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=PhongKhamThuY;encrypt=true;trustServerCertificate=true"
      DB_USERNAME: "${DB_USERNAME:sa}"
      DB_PASSWORD: "${DB_PASSWORD:123456}"
      JWT_SECRET: "${JWT_SECRET:your_super_secret_key_change_this_in_production_immediately_use_min_32_chars}"
      JWT_EXPIRATION: "${JWT_EXPIRATION:86400000}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      # Cấu hình Redis cho Caching khi chạy trên Docker
      SPRING_DATA_REDIS_HOST: "redis"
      SPRING_DATA_REDIS_PORT: "6379"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}"
    # ports:
    #   - "8081:8081" # BẢO MẬT: Ẩn port Backend, bắt buộc đi qua NGINX
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - rexi_network
    deploy:
      mode: replicated
      replicas: 1 # Bắt đầu với 1 container, có thể scale lên sau
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '1.0'
          memory: 1500M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/api/lich-hen/count" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Vite build tĩnh - biến PHẢI truyền vào lúc build qua args, không phải runtime environment
        # Khi chạy Docker nội bộ: dùng tên service 'backend'. Khi deploy lên server: dùng IP/Domain thật
        VITE_API_URL: "${VITE_API_URL:-http://backend:8081}"
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID}"
    # ports:
    #   - "3000:3000" # BẢO MẬT: Ẩn port Frontend, bắt buộc đi qua NGINX
    depends_on:
      - backend
    networks:
      - rexi_network
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for Caching
  redis:
    image: redis:alpine
    container_name: rexi_redis
    ports:
      - "6379:6379"
    networks:
      - rexi_network
    restart: always
    volumes:
      - redis_data:/data
      
  # Lớp khiên NGINX (Reverse Proxy & Rate Limiter)
  nginx:
    image: nginx:alpine
    container_name: rexi_nginx
    ports:
      - "80:80"    # Mở cổng HTTP tiêu chuẩn 80 ra ngoài
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rexi_network
    restart: always

volumes:
  sqlserver_data:
    driver: local
  backend_logs:
    driver: local
  redis_data:
    driver: local

networks:
  rexi_network:
    driver: bridge
