worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # BẢO MẬT: Giới hạn số lượng request để chống Spam/DDoS (20 request/giây cho mỗi IP)
    limit_req_zone $binary_remote_addr zone=rexi_limit:10m rate=20r/s;

    # Ẩn phiên bản NGINX để tránh hacker dò lỗi
    server_tokens off;

    # NÂNG HẠN MỨC TẢI FILE (Quan trọng để gửi Video/Ảnh cho AI)
    client_max_body_size 100M;

    server {
        listen 80;
        server_name localhost; # Thay bằng tên miền của sếp khi lên Production (VD: rexivet.vn)

        # 1. Điều hướng Frontend (React)
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Hỗ trợ WebSocket (Dùng cho Vite HMR lúc Dev)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. Điều hướng Backend API (Spring Boot) có kèm khiên chắn DDoS
        location /api/ {
            limit_req zone=rexi_limit burst=50 nodelay;
            proxy_pass http://backend:8081/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Bảo mật thư mục Uploads (KHÔNG CHO PHÉP THỰC THI SCRIPT)
        location /uploads/ {
            # Chặn thực thi mọi loại script để tránh hacker upload shell
            location ~* \.(php|pl|py|jsp|sh|cgi|asp|aspx)$ {
                deny all;
            }
        }
    }
}