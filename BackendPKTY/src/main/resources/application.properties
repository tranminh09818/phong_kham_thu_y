server.port=8081

# Database Configuration - Use Environment Variables
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost;databaseName=PhongKhamThuY;encrypt=true;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123456}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Logging Configuration
logging.level.root=WARN
logging.level.com.rexi.pkty=INFO
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# AI API Keys - Use Environment Variables (NEVER hardcode)
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile
groq.vision.model=meta-llama/llama-4-scout-17b-16e-instruct

gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-flash-latest

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this_in_production_immediately}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Configuration
server.tomcat.max-http-post-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Application Configuration
app.name=Rexi - Phong Kham Thu Y Management System
app.version=1.0.0
