server.port=8081

# CẤU HÌNH DATABASE - Kết nối SQL Server
spring.datasource.url=${DB_URL:jdbc:sqlserver://127.0.0.1:1433;databaseName=PhongKhamThuY;encrypt=true;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123456}

# Cấu hình để NGINX Proxy có thể hoạt động chung với requiresSecure()
server.forward-headers-strategy=native

# CẤU HÌNH JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# CẤU HÌNH LOGGING (Ghi nhật ký hệ thống)
logging.level.root=WARN
logging.level.com.rexi.pkty=INFO
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# CẤU HÌNH CHÌA KHÓA AI (Groq & Gemini)
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile
groq.vision.model=meta-llama/llama-4-scout-17b-16e-instruct

gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-flash-latest

# CẤU HÌNH CHÌA KHÓA JWT (Thẻ bài đăng nhập)
jwt.secret=${JWT_SECRET:RexiVetSystem2025SuperSecretKey256BitLongKeyForHMACAuthentication!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CẤU HÌNH TẢI FILE (Hình ảnh thú cưng, bệnh án)
server.tomcat.max-http-post-size=50MB
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CẤU HÌNH CORS (Kết nối Frontend - Backend)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost:3005}

# THÔNG TIN ỨNG DỤNG
app.name=Rexi - Hệ thống quản lý phòng khám thú y
app.version=1.0.0

# CẤU HÌNH GỬI EMAIL (Google SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:rexivetsys@gmail.com}
